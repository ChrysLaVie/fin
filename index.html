<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças & Processos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#F5F3EE;--surface:#FFF;--surface2:#EDEBE6;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1A1916;--muted:#7A7870;--hint:#B0AEA8;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-t:#0F6E56;
  --red:#D85A30;--red-bg:#FAECE7;--red-t:#993C1D;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-t:#854F0B;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-t:#0C447C;
  --purple:#534AB7;--purple-bg:#EDEAFB;--purple-t:#3A3190;
  --accent:#3C3489;--r:10px;--rl:16px;
}
[data-theme=dark]{
  --bg:#131211;--surface:#1E1D1A;--surface2:#272520;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#F0EDE8;--muted:#9A9890;--hint:#5A5856;
  --green-bg:#082E22;--green-t:#5DCAA5;
  --red-bg:#2E1208;--red-t:#F0997B;
  --amber-bg:#2E1E00;--amber-t:#FAC775;
  --blue-bg:#081828;--blue-t:#85B7EB;
  --purple-bg:#1A1840;--purple-t:#9B96E8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;transition:background .2s,color .2s;}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:2.5rem;width:100%;max-width:400px;}
.auth-logo{font-family:'DM Serif Display',serif;font-size:32px;margin-bottom:.25rem;}
.auth-logo span{color:var(--accent);}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:2rem;}
.auth-tabs{display:flex;margin-bottom:1.5rem;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;}
.auth-tab{flex:1;padding:8px;font-size:13px;background:none;border:none;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;}
.auth-tab.on{background:var(--accent);color:#fff;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;}
.field input:focus{border-color:var(--accent);}
